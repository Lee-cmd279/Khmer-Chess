name: Train Ouk Chess AI

on:
  schedule:
    - cron: '0 0 * * *'   # runs every day at midnight UTC
    - cron: '0 6 * * *'   # runs every day at 6am UTC
    - cron: '0 12 * * *'  # runs every day at noon UTC
    - cron: '0 18 * * *'  # runs every day at 6pm UTC
  workflow_dispatch:        # also allows manual trigger from GitHub UI

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 340    # just under GitHub's 6hr limit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run training
        env:
          JSONBIN_KEY: ${{ secrets.JSONBIN_KEY }}
          JSONBIN_BIN: ${{ secrets.JSONBIN_BIN }}
        run: python ouk_train.py

      - name: Upload weights as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ouk-weights-${{ github.run_number }}
          path: ouk_weights.json
          retention-days: 30
